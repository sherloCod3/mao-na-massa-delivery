# SonarCloud project configuration
# Replace placeholders with actual values from https://sonarcloud.io

sonar.projectKey=mao-na-massa-backend
sonar.organization=mao-na-massa

sonar.sources=app
sonar.tests=tests
sonar.python.version=3.12

# Coverage reports (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclude generated files
sonar.exclusions=alembic/versions/**,.venv/**

# Encoding
sonar.sourceEncoding=UTF-8
