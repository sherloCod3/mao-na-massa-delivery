# Evolution API — Gateway WhatsApp
# ================================
# Uso: docker compose up -d
# Acessar: http://localhost:8080
# Docs: https://doc.evolution-api.com
#
# 1. Criar instância: POST http://localhost:8080/instance/create
# 2. Escanear QR Code com o WhatsApp
# 3. Enviar mensagem: POST http://localhost:8080/message/send
#
# Nosso backend FastAPI (notificador.py) chama essa API.

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ─── Database (SQLite local) ──────────────────────
      DATABASE_ENABLED: "true"
      DATABASE_CONNECTION_URI: "file:///evolution/database.sqlite"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"

      # ─── Autenticação ─────────────────────────────────
      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "mao-na-massa-key"

      # ─── Server ───────────────────────────────────────
      SERVER_PORT: 8080

      # ─── Logs ─────────────────────────────────────────
      LOG_LEVEL: "ERROR"
      LOG_SAVE: "true"
      LOG_FILE: "/evolution/logs.txt"

      # ─── Webhook (opcional - desligado por padrão) ────
      # Descomente para receber notificações de mensagens:
      # WEBHOOK_ENABLED: "true"
      # WEBHOOK_URL: "http://seu-backend:8000/api/v1/whatsapp-webhook"

      # ─── Redis (opcional - desligado) ─────────────────
      REDIS_ENABLED: "false"

      # ─── Cache de QR Code ─────────────────────────────
      QRCODE_LIMIT: "30"
    volumes:
      - evolution_data:/evolution

volumes:
  evolution_data:
